<!--
  Solarflower icon sprite — single-form clay marks
  Each icon is one continuous closed path. Color carries meaning.
  The clay filter roughens edges and adds surface grain.
  All symbols: viewBox="0 0 48 48"
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <defs>
    <!--
      Clay filter: two-stage organic treatment.
      1. feDisplacementMap warps the boundary so edges feel hand-pressed.
      2. fractalNoise grain blended onto the surface via multiply gives
         the matte, non-digital feel of fired clay or worn stone.
    -->
    <filter id="sf-clay" x="-8%" y="-8%" width="116%" height="116%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.045 0.065"
                    numOctaves="5" seed="9" result="warp"/>
      <feDisplacementMap in="SourceGraphic" in2="warp" scale="1.5"
                         xChannelSelector="R" yChannelSelector="G" result="warped"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="4"
                    seed="2" result="grain"/>
      <feColorMatrix in="grain" type="saturate" values="0" result="gray-grain"/>
      <feComposite in="gray-grain" in2="warped" operator="in" result="masked-grain"/>
      <feBlend in="warped" in2="masked-grain" mode="multiply"/>
    </filter>
  </defs>

  <!--
    NOTEBOOK — amber #F5A623
    A six-point clay tablet: roughly rectangular, no straight edges,
    slightly wider at bottom than top. Knowledge as compressed earth.
  -->
  <symbol id="sf-notebook" viewBox="0 0 48 48">
    <path d="M 11,9 L 37,8 L 41,11 L 40,40 L 10,42 L 7,38 Z"
          fill="#F5A623" filter="url(#sf-clay)"/>
  </symbol>

  <!--
    ADVISOR — blue #2D7DD2
    An asymmetric rhombus: precision formed through natural geometry.
    Slightly off-center so it feels found, not constructed.
  -->
  <symbol id="sf-advisor" viewBox="0 0 48 48">
    <path d="M 25,4 L 43,22 L 24,44 L 5,24 Z"
          fill="#2D7DD2" filter="url(#sf-clay)"/>
  </symbol>

  <!--
    COMPASS — dark green #3D5240
    An upward-pointing oval: elongation conveys direction without a rose.
    The form narrows toward the top — where you're headed.
  -->
  <symbol id="sf-compass" viewBox="0 0 48 48">
    <path d="M 24,5 C 28,4 38,16 38,29 C 38,38 32,44 24,44 C 16,44 10,38 10,29 C 10,16 20,4 24,5 Z"
          fill="#3D5240" filter="url(#sf-clay)"/>
  </symbol>

  <!--
    SUN — amber #F5A623
    An irregular seven-sided polygon: radiant mass without rays.
    The asymmetry in the vertices makes it feel like a cast impression.
  -->
  <symbol id="sf-sun" viewBox="0 0 48 48">
    <path d="M 24,5 L 40,13 L 43,30 L 33,43 L 13,42 L 5,27 L 9,12 Z"
          fill="#F5A623" filter="url(#sf-clay)"/>
  </symbol>

  <!--
    LOCATION — terracotta #C75B39
    A weighted teardrop: broad at the equator, tapering below.
    Clay color grounds it in soil and place.
  -->
  <symbol id="sf-location" viewBox="0 0 48 48">
    <path d="M 24,6 C 15,6 9,14 9,23 C 9,34 24,44 24,44 C 24,44 39,34 39,23 C 39,14 33,6 24,6 Z"
          fill="#C75B39" filter="url(#sf-clay)"/>
  </symbol>

</svg>
